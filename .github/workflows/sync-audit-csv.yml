name: Sync audited Matchbook CSV

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/sync-audit-csv.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply audited tracker promotions
        run: |
          python - <<'PY'
          import csv
          from pathlib import Path

          path = Path('matchbook_tracker_data.csv')
          with path.open(newline='', encoding='utf-8-sig') as handle:
              reader = csv.DictReader(handle)
              fieldnames = reader.fieldnames
              rows = list(reader)

          updates = {
              '01': 'MET | 01_START_HERE/Implementation_Non-Negotiables.md; 13_COACHING_OBSERVATION_AND_RUBRIC_ALIGNMENT/Observation_and_Coaching_Tool.md; 11_STUDENT_TRAINING_AND_VOICE/What_Coaching_Observation_Is_Mini-Lesson.md; 13_COACHING_OBSERVATION_AND_RUBRIC_ALIGNMENT/Coaching_Observation_Rehearsal_Card.md; 13_COACHING_OBSERVATION_AND_RUBRIC_ALIGNMENT/Coaching_Look-Fors_by_Grade_Band.md; 15_SLIDE_DECK_DRAFTS/Matchbook_Culture_Decks/Coaching_Observation_and_Rubric_Alignment_Deck.html [audit 2026-06-04, resources drafted]',
              '20': 'MET | 20_TIER2_AND_TIER3_LOCAL_OPERATING_LAYER/SST_MTSS_Review_Template.md; 20_TIER2_AND_TIER3_LOCAL_OPERATING_LAYER/Tier_2_and_Tier_3_Local_Threshold_Map.md; 13_COACHING_OBSERVATION_AND_RUBRIC_ALIGNMENT/Observation_and_Coaching_Tool.md; 11_STUDENT_TRAINING_AND_VOICE/What_Coaching_Observation_Is_Mini-Lesson.md; 13_COACHING_OBSERVATION_AND_RUBRIC_ALIGNMENT/Coaching_Observation_Rehearsal_Card.md; 13_COACHING_OBSERVATION_AND_RUBRIC_ALIGNMENT/Coaching_Look-Fors_by_Grade_Band.md; 15_SLIDE_DECK_DRAFTS/Matchbook_Culture_Decks/Coaching_Observation_and_Rubric_Alignment_Deck.html [audit 2026-06-04, resources drafted]',
          }

          found = set()
          for row in rows:
              folder_id = str(row.get('folder_id', '')).zfill(2)
              if folder_id in updates:
                  row['coaching_observation'] = updates[folder_id]
                  found.add(folder_id)

          if found != set(updates):
              raise SystemExit(f'Expected folders 01 and 20, found {sorted(found)}')

          with path.open('w', newline='', encoding='utf-8') as handle:
              writer = csv.DictWriter(handle, fieldnames=fieldnames, quoting=csv.QUOTE_ALL)
              writer.writeheader()
              writer.writerows(rows)
          PY
      - name: Commit CSV and remove temporary workflow
        run: |
          rm .github/workflows/sync-audit-csv.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add matchbook_tracker_data.csv .github/workflows/sync-audit-csv.yml
          git commit -m "Sync audited Matchbook tracker statuses"
          git push
