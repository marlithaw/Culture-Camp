name: Culture tracker evidence sync

on:
  push:
    paths:
      - scripts/sync-evidence-tracker.mjs
      - .github/workflows/culture-tracker-evidence-sync.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Apply evidence tracker sync
        run: node scripts/sync-evidence-tracker.mjs
      - name: Commit corrected tracker data
        run: |
          if [ -n "$(git status --porcelain sessions.json live_tracker.html matchbook_tracker_data.csv)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add sessions.json live_tracker.html matchbook_tracker_data.csv
            git commit -m "Sync culture tracker evidence audit"
            git push
          else
            echo "No tracker data changes to commit."
          fi
