name: Apply Culture Tracker Sync

on:
  push:
    paths:
      - tools/apply_culture_tracker_updates.py
      - .github/workflows/apply-culture-tracker-sync.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Apply culture tracker updates
        run: python tools/apply_culture_tracker_updates.py
      - name: Commit generated tracker files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add live_tracker.html sessions.json matchbook_tracker_data.csv
          if git diff --cached --quiet; then
            echo "No tracker changes to commit."
          else
            git commit -m "Apply culture tracker data updates"
            git push
          fi
