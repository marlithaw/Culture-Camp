<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Matchbook Culture Build Board</title>
  <style>
    :root {
      --bg: #1f120d;
      --bg-2: #2a1812;
      --panel: rgba(39, 30, 25, 0.94);
      --panel-2: rgba(52, 40, 33, 0.92);
      --panel-3: rgba(29, 24, 20, 0.96);
      --line: rgba(255, 214, 143, 0.16);
      --line-strong: rgba(255, 214, 143, 0.3);
      --text: #f8eddb;
      --muted: #d0bda1;
      --soft: #b1947f;
      --glow: #ffb857;
      --glow-2: #ffdf7b;
      --track-spine: #ff8c79;
      --track-anchors: #8fd0ff;
      --track-spaces: #9af0a2;
      --track-classroom: #ffc384;
      --track-repair: #d3acff;
      --track-recognition: #ffe68a;
      --track-adult: #84e2d1;
      --track-evidence: #c6d1df;
      --shadow: 0 18px 50px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Aptos, "Segoe UI", sans-serif;
      background:
        linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px),
        radial-gradient(circle at 50% 0%, rgba(255, 160, 85, 0.12), transparent 36%),
        linear-gradient(180deg, #2b160f 0%, #17100c 100%);
      background-size: 176px 96px, 176px 96px, auto, auto;
    }

    .page-shell {
      width: min(1960px, calc(100vw - 16px));
      margin: 0 auto;
      padding: 14px 0 28px;
    }

    .masthead {
      text-align: center;
      margin-bottom: 18px;
    }

    .title-frame {
      display: inline-block;
      margin: 0 auto 16px;
      padding: 18px 28px;
      border: 2px solid rgba(255, 184, 87, 0.8);
      border-radius: 22px;
      box-shadow:
        0 0 0 1px rgba(255, 238, 204, 0.18) inset,
        0 0 28px rgba(255, 170, 71, 0.22),
        0 0 80px rgba(255, 170, 71, 0.14);
      background: linear-gradient(180deg, rgba(65, 31, 17, 0.9), rgba(41, 22, 15, 0.95));
    }

    .title-frame h1 {
      margin: 0;
      font-family: Impact, Haettenschweiler, "Arial Narrow Bold", sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      line-height: 0.95;
      font-size: clamp(2.7rem, 5.7vw, 6rem);
      color: #ffd46f;
      text-shadow:
        0 0 12px rgba(255, 188, 91, 0.85),
        0 0 32px rgba(255, 135, 73, 0.55);
    }

    .masthead p {
      width: min(1100px, 100%);
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(1rem, 1.5vw, 1.2rem);
      line-height: 1.45;
    }

    .control-stack {
      display: grid;
      gap: 12px;
      margin-bottom: 12px;
    }

    .mode-row,
    .legend-row,
    .filter-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .mode-pill,
    .filter-pill,
    .legend-pill,
    .link-pill {
      border: 1px solid rgba(255, 232, 194, 0.2);
      border-radius: 999px;
      background: rgba(82, 57, 40, 0.7);
      color: var(--text);
      font: inherit;
      text-decoration: none;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, box-shadow 140ms ease;
    }

    .mode-pill,
    .filter-pill,
    .link-pill {
      padding: 12px 22px;
      cursor: pointer;
      font-weight: 700;
    }

    .mode-pill:hover,
    .filter-pill:hover,
    .link-pill:hover {
      transform: translateY(-1px);
      border-color: rgba(255, 217, 140, 0.56);
      background: rgba(114, 81, 58, 0.82);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
    }

    .mode-pill.active,
    .filter-pill.active {
      background: linear-gradient(180deg, #ffe27c, #f8cb54);
      color: #2d1c0f;
      border-color: rgba(255, 238, 204, 0.95);
      box-shadow:
        0 0 0 1px rgba(255, 246, 219, 0.55) inset,
        0 0 22px rgba(255, 213, 102, 0.3);
    }

    .legend-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      color: var(--muted);
      background: rgba(50, 35, 27, 0.84);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      box-shadow: 0 0 10px currentColor;
    }

    .overview-bar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: center;
      margin: 0 0 16px;
      padding: 18px 22px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: rgba(37, 26, 21, 0.88);
      box-shadow: var(--shadow);
    }

    .overview-bar h2 {
      margin: 0 0 6px;
      font-size: clamp(1.2rem, 2vw, 1.55rem);
      color: #ffe08c;
      letter-spacing: 0.02em;
    }

    .overview-bar p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .overview-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .dashboard-shell {
      display: grid;
      grid-template-columns: minmax(0, 1.95fr) minmax(320px, 390px);
      gap: 18px;
      align-items: start;
    }

    .matrix-panel,
    .detail-panel {
      border: 1px solid var(--line);
      border-radius: 24px;
      background: rgba(29, 24, 20, 0.95);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .matrix-scroll {
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-color: rgba(255, 202, 109, 0.48) rgba(53, 38, 30, 0.7);
    }

    .matrix-grid {
      display: grid;
      grid-template-columns: 300px repeat(10, minmax(104px, 1fr));
      min-width: 1340px;
    }

    .corner-cell,
    .session-cell,
    .track-cell,
    .matrix-cell {
      border-right: 1px solid rgba(255, 239, 210, 0.14);
      border-bottom: 1px solid rgba(255, 239, 210, 0.12);
    }

    .corner-cell {
      padding: 22px 20px;
      background: linear-gradient(180deg, rgba(214, 201, 181, 0.96), rgba(146, 133, 116, 0.92));
      color: #1c1713;
      font-family: "Book Antiqua", "Palatino Linotype", Georgia, serif;
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-align: center;
    }

    .session-cell {
      padding: 10px 8px 12px;
      min-height: 88px;
      background: linear-gradient(180deg, rgba(205, 194, 177, 0.95), rgba(152, 141, 126, 0.92));
      color: #261d17;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
      justify-content: flex-start;
    }

    .session-button {
      width: 100%;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      text-align: center;
      font: inherit;
    }

    .session-label {
      display: block;
      font-weight: 800;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.82rem;
      margin-bottom: 6px;
    }

    .session-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      width: 100%;
      padding: 6px 8px;
      border-radius: 8px;
      background: linear-gradient(180deg, rgba(112, 58, 36, 0.96), rgba(140, 79, 48, 0.92));
      color: #ffd679;
      border: 1px solid rgba(255, 224, 154, 0.28);
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      line-height: 1;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.14) inset;
    }

    .session-button.active .session-chip {
      background: linear-gradient(180deg, #ffd45c, #f2b24d);
      color: #2e1809;
      border-color: rgba(255, 247, 210, 0.9);
      box-shadow:
        0 0 0 1px rgba(255, 240, 207, 0.55) inset,
        0 0 18px rgba(255, 184, 87, 0.25);
    }

    .track-cell {
      padding: 20px 16px;
      background: linear-gradient(180deg, rgba(69, 69, 68, 0.98), rgba(43, 43, 42, 0.98));
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .track-index {
      min-width: 100px;
      color: #faf3e7;
      font-family: "Book Antiqua", "Palatino Linotype", Georgia, serif;
      font-size: 0.92rem;
      font-weight: 700;
      line-height: 0.98;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .track-index strong {
      display: block;
      font-size: 1.02rem;
      margin-bottom: 4px;
    }

    .track-strap {
      color: #d6c7b4;
      font-size: 0.78rem;
      line-height: 1.2;
      max-width: 118px;
      font-weight: 700;
    }

    .matrix-cell {
      min-height: 126px;
      padding: 10px 8px;
      background:
        linear-gradient(180deg, rgba(48, 44, 41, 0.97), rgba(31, 29, 27, 0.97));
      position: relative;
    }

    .matrix-cell.session-active {
      background:
        linear-gradient(180deg, rgba(62, 52, 44, 0.98), rgba(42, 35, 30, 0.98));
    }

    .matrix-card-stack {
      display: grid;
      gap: 10px;
      align-content: start;
      height: 100%;
    }

    .matrix-card {
      display: block;
      width: 100%;
      min-height: 84px;
      padding: 11px 9px;
      border-radius: 16px;
      border: 1px solid rgba(255, 245, 226, 0.22);
      text-align: left;
      cursor: pointer;
      font: inherit;
      color: #23160e;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.1) inset,
        0 10px 22px rgba(0, 0, 0, 0.18);
      transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
      overflow: hidden;
      word-break: break-word;
    }

    .matrix-card:hover {
      transform: translateY(-1px);
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.16) inset,
        0 14px 28px rgba(0, 0, 0, 0.24);
      border-color: rgba(255, 247, 220, 0.52);
    }

    .matrix-card.active {
      transform: translateY(-1px) scale(1.01);
      border-color: rgba(255, 247, 210, 0.96);
      box-shadow:
        0 0 0 2px rgba(255, 247, 210, 0.36) inset,
        0 0 0 3px rgba(255, 184, 87, 0.15),
        0 18px 34px rgba(0, 0, 0, 0.28);
    }

    .matrix-card .mini-kicker {
      display: block;
      font-size: 0.76rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 8px;
      opacity: 0.76;
    }

    .matrix-card .mini-title {
      display: block;
      font-size: 0.72rem;
      line-height: 1.03;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.01em;
    }

    .domain-spine {
      background: linear-gradient(180deg, #ffd3ce, #ff8f82);
    }

    .domain-anchors {
      background: linear-gradient(180deg, #e8f7ff, #8fd4ff);
    }

    .domain-spaces {
      background: linear-gradient(180deg, #ebffe6, #9cf0a5);
    }

    .domain-classroom {
      background: linear-gradient(180deg, #fff0d5, #ffc78f);
    }

    .domain-repair {
      background: linear-gradient(180deg, #f0ddff, #cfb0ff);
    }

    .domain-recognition {
      background: linear-gradient(180deg, #fff7ca, #ffe287);
    }

    .domain-adult {
      background: linear-gradient(180deg, #dffbf6, #8de3d2);
    }

    .domain-evidence {
      background: linear-gradient(180deg, #edf4fb, #c9d5e3);
    }

    .detail-panel {
      position: sticky;
      top: 12px;
      padding: 18px 18px 24px;
      background: rgba(27, 22, 18, 0.96);
      max-height: calc(100vh - 24px);
      overflow: auto;
    }

    .detail-panel .mode-tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255, 227, 170, 0.2);
      background: rgba(69, 49, 37, 0.72);
      color: var(--muted);
      font-size: 0.86rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-weight: 800;
    }

    .detail-panel h3 {
      margin: 0 0 8px;
      font-family: "Book Antiqua", "Palatino Linotype", Georgia, serif;
      font-size: clamp(2rem, 2.65vw, 3.1rem);
      line-height: 0.94;
      text-transform: uppercase;
      color: #ffd97a;
      letter-spacing: 0.01em;
    }

    .detail-subhead {
      margin: 0 0 18px;
      color: #d6c5b0;
      font-size: 1rem;
      line-height: 1.35;
      font-weight: 700;
    }

    .detail-meta-row,
    .flag-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 18px;
    }

    .detail-meta-pill,
    .flag-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border-radius: 999px;
      border: 1px solid rgba(255, 220, 163, 0.14);
      background: rgba(70, 54, 42, 0.92);
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .flag-pill.yes {
      color: #ffe8a9;
      border-color: rgba(255, 223, 123, 0.25);
      background: rgba(118, 86, 36, 0.52);
    }

    .flag-pill.no {
      color: #cfb7a1;
      border-color: rgba(207, 183, 161, 0.16);
      background: rgba(58, 46, 38, 0.92);
      opacity: 0.86;
    }

    .detail-block {
      margin-bottom: 20px;
    }

    .detail-block h4 {
      margin: 0 0 8px;
      color: #f9cc72;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 900;
    }

    .detail-block p,
    .detail-block li {
      margin: 0;
      color: #f0e8da;
      line-height: 1.48;
      font-size: 0.98rem;
    }

    .detail-grid {
      display: grid;
      gap: 10px;
    }

    .detail-field {
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255, 220, 163, 0.1);
      background: rgba(44, 35, 29, 0.92);
    }

    .detail-field-label {
      display: block;
      margin: 0 0 6px;
      color: #f9cc72;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-weight: 900;
    }

    .detail-field-value {
      margin: 0;
      color: #f0e8da;
      line-height: 1.45;
      font-size: 0.96rem;
    }

    .problem-callout {
      padding: 14px 16px;
      border-left: 4px solid #ffdf69;
      border-radius: 0 12px 12px 0;
      background: rgba(117, 94, 50, 0.24);
    }

    .micro-list {
      display: grid;
      gap: 12px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .source-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .source-pill {
      display: inline-flex;
      align-items: center;
      padding: 8px 10px;
      border-radius: 999px;
      background: rgba(70, 54, 42, 0.92);
      color: var(--muted);
      font-size: 0.82rem;
      border: 1px solid rgba(255, 220, 163, 0.14);
    }

    .footer-note {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid rgba(255, 223, 171, 0.14);
      color: var(--soft);
      font-size: 0.92rem;
      line-height: 1.45;
    }

    .muted-empty {
      color: var(--soft);
      font-size: 0.86rem;
      line-height: 1.4;
      opacity: 0.86;
    }

    @media (max-width: 1240px) {
      .dashboard-shell {
        grid-template-columns: 1fr;
      }

      .detail-panel {
        position: static;
      }
    }

    @media (max-width: 760px) {
      .page-shell {
        width: min(100vw - 16px, 1880px);
      }

      .overview-bar {
        grid-template-columns: 1fr;
      }

      .overview-actions {
        justify-content: flex-start;
      }

      .title-frame {
        width: 100%;
      }

      .title-frame h1 {
        font-size: clamp(2.2rem, 10vw, 4rem);
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="masthead">
      <div class="title-frame">
        <h1>Matchbook Culture Build Board<br>BOY Training + 10-Day Culture Camp</h1>
      </div>
      <p id="boardSubtitle"></p>
    </header>

    <section class="control-stack">
      <div class="mode-row" id="modeRow"></div>
      <div class="legend-row" id="legendRow"></div>
      <div class="filter-row" id="filterRow"></div>
    </section>

    <section class="overview-bar">
      <div>
        <h2 id="overviewTitle"></h2>
        <p id="overviewCopy"></p>
      </div>
      <div class="overview-actions">
        <a class="link-pill" href="./matchbook_tracker_data.csv" download>Download Tracker Data CSV</a>
      </div>
    </section>

    <section class="dashboard-shell">
      <div class="matrix-panel">
        <div class="matrix-scroll">
          <div class="matrix-grid" id="matrixGrid"></div>
        </div>
      </div>

      <aside class="detail-panel" id="detailPanel"></aside>
    </section>
  </div>

  <script>
    const TRACKS = [
      { id: 'spine', short: 'Track 1', title: 'Culture Spine', strap: 'Shared values, shared language', color: 'var(--track-spine)', className: 'domain-spine' },
      { id: 'anchors', short: 'Track 2', title: 'Daily Anchors', strap: 'Entry, First Five, Morning Meeting', color: 'var(--track-anchors)', className: 'domain-anchors' },
      { id: 'spaces', short: 'Track 3', title: 'Physical Spaces', strap: 'Movement and public culture', color: 'var(--track-spaces)', className: 'domain-spaces' },
      { id: 'classroom', short: 'Track 4', title: 'Classroom Systems', strap: 'Learning routines and independence', color: 'var(--track-classroom)', className: 'domain-classroom' },
      { id: 'repair', short: 'Track 5', title: 'Repair and Regulation', strap: 'Reteach before escalation', color: 'var(--track-repair)', className: 'domain-repair' },
      { id: 'recognition', short: 'Track 6', title: 'Identity and Recognition', strap: 'Evidence, not popularity', color: 'var(--track-recognition)', className: 'domain-recognition' },
      { id: 'adult', short: 'Track 7', title: 'Adult Calibration', strap: 'Adults rehearse before students', color: 'var(--track-adult)', className: 'domain-adult' },
      { id: 'evidence', short: 'Track 8', title: 'Evidence and Sustainability', strap: 'Walkthroughs, proof, and next steps', color: 'var(--track-evidence)', className: 'domain-evidence' }
    ];

    const TRACK_LOOKUP = Object.fromEntries(TRACKS.map((track) => [track.id, track]));

    const BOARD_DATA = {
      adult: {
        key: 'adult',
        button: 'BOY Adult Calibration Track',
        subtitle: 'Interactive planning dashboard: adult BOY calibration installs the teacher moves first. Student Culture Camp then teaches, rehearses, resets, and transfers the full culture playbook across spaces, relationships, recognition, re-entry, and routines.',
        overviewTitle: 'Adult BOY calibration should let leaders see the whole system at once.',
        overviewCopy: 'This board maps each adult session against the eight culture lanes so you can spot where shared language, routines, regulation, recognition, and evidence get installed before students ever touch the system.',
        sessions: [
          { id: 'a1', label: 'Session 1', short: 'Spine', title: 'BOY Session 1: Culture Spine' },
          { id: 'a2', label: 'Session 2', short: 'Teach Routines', title: 'BOY Session 2: Teach Routines' },
          { id: 'a3', label: 'Session 3', short: 'Daily Anchor', title: 'BOY Session 3: Daily Anchor' },
          { id: 'a4', label: 'Session 4', short: 'Movement', title: 'BOY Session 4: Movement' },
          { id: 'a5', label: 'Session 5', short: 'Shared Spaces', title: 'BOY Session 5: Shared Spaces' },
          { id: 'a6', label: 'Session 6', short: 'Classroom', title: 'BOY Session 6: Classroom Systems' },
          { id: 'a7', label: 'Session 7', short: 'Recognition', title: 'BOY Session 7: Recognition' },
          { id: 'a8', label: 'Session 8', short: 'Repair', title: 'BOY Session 8: Repair and Regulation' },
          { id: 'a9', label: 'Session 9', short: 'Houses', title: 'BOY Session 9: Identity and Houses' },
          { id: 'a10', label: 'Session 10', short: 'Whole Culture', title: 'BOY Session 10: Whole Culture Logic Check' }
        ],
        cards: [
          {
            id: 'adult-a1-spine',
            session: 'a1',
            track: 'spine',
            kicker: 'Calibrate',
            label: 'Safe, respectful, responsible behavior matrix',
            title: 'BOY Session 1: Culture Spine',
            subhead: 'Adult Calibration | Culture Spine',
            vision: 'Adults name the same values, the same behaviors, and the same system purpose before they ever teach students.',
            consensus: 'This is the shared language layer. No classroom gets its own culture dialect.',
            problem: 'When adults define “respect” differently, students experience contradiction instead of consistency.',
            skill: 'Align the value language, the behavior matrix, and the non-negotiable identity lines.',
            bridge: 'A shared spine reduces mixed messages and gives every later routine a common reference point.',
            resources: 'Executive Overview, Implementation Non-Negotiables, Core Language Glossary, Matchbook-Specific Culture Alignment Page.',
            action: 'Have adults rewrite vague value language into observable behavior examples by grade band and space.',
            debrief: 'What definition still feels fuzzy? Where might one team still improvise the meaning?',
            sources: ['01_START_HERE/Executive_Overview.md', '01_START_HERE/Implementation_Non-Negotiables.md', '01_START_HERE/Core_Language_Glossary.md']
          },
          {
            id: 'adult-a1-adult',
            session: 'a1',
            track: 'adult',
            kicker: 'Anchor',
            label: 'Agree on adult posture, cues, and facilitation stance',
            title: 'BOY Session 1: Adult Posture Agreement',
            subhead: 'Adult Calibration | Adult Calibration',

    const state = {
      mode: 'adult',
      trackFilter: 'all',
      sessionId: BOARD_DATA.adult.sessions[0].id,
      cardId: null
    };

    function createNode(tag, className, text) {
      const node = document.createElement(tag);
      if (className) {
        node.className = className;
      }
      if (text !== undefined) {
        node.textContent = text;
      }
      return node;
    }

    function currentBoard() {
      return BOARD_DATA[state.mode];
    }

    function currentSession() {
      return currentBoard().sessions.find((session) => session.id === state.sessionId) || currentBoard().sessions[0];
    }

    function visibleCards() {
      const cards = currentBoard().cards;
      if (state.trackFilter === 'all') {
        return cards;
      }
      return cards.filter((card) => card.track === state.trackFilter);
    }

    function activeCard() {
      const cards = visibleCards();
      return cards.find((card) => card.id === state.cardId) || null;
    }

    function firstCardForSession(sessionId) {
      return visibleCards().find((card) => card.session === sessionId) || null;
    }

    function ensureActiveCard() {
      const card = activeCard();
      if (card) {
        return card;
      }
      const sessionCard = firstCardForSession(state.sessionId);
      if (sessionCard) {
        state.cardId = sessionCard.id;
        return sessionCard;
      }
      const firstVisible = visibleCards()[0] || null;
      state.cardId = firstVisible ? firstVisible.id : null;
      return firstVisible;
    }

    function setMode(mode) {
      state.mode = mode;
      state.trackFilter = 'all';
      state.sessionId = currentBoard().sessions[0].id;
      state.cardId = null;
      ensureActiveCard();
      render();
    }

    function setTrackFilter(trackId) {
      state.trackFilter = trackId;
      const currentVisible = activeCard();
      if (!currentVisible) {
        state.cardId = null;
      }
      ensureActiveCard();
      render();
    }

    function setSession(sessionId) {
      state.sessionId = sessionId;
      const next = firstCardForSession(sessionId);
      state.cardId = next ? next.id : null;
      render();
    }

    function setCard(cardId) {
      const card = currentBoard().cards.find((entry) => entry.id === cardId);
      if (!card) {
        return;
      }
      state.sessionId = card.session;
      state.cardId = cardId;
      render();
    }

    function trackConnections(trackId) {
      const connections = {
        spine: {
          safe: 'Shared language lowers ambiguity and gives students the same definition of safety in every room.',
          respectful: 'Common value language protects how students and adults speak to and about one another.',
          responsible: 'Students can explain what ownership looks like instead of guessing what adults mean.'
        },
        anchors: {
          safe: 'Predictable openings calm nervous systems and reduce the need for reactive correction.',
          respectful: 'Students protect speaker, space, time, and turn-taking during the first part of the day.',
          responsible: 'Students manage entry, materials, and first moves with less adult narration.'
        },
        spaces: {
          safe: 'Bodies move in calm, observable patterns across hallways, lunch, recess, and dismissal.',
          respectful: 'Shared spaces stay usable because students honor lanes, noise levels, and handoffs.',
          responsible: 'Students carry the routine across thresholds instead of restarting from zero in each space.'
        },
        classroom: {
          safe: 'Clear procedures prevent chaos and make the learning environment feel secure.',
          respectful: 'Collaboration, materials use, and transitions stay orderly and fair to peers.',
          responsible: 'Students manage tools, work flow, cleanup, and room reset with visible ownership.'
        },
        repair: {
          safe: 'Regulation comes before escalation, so students can actually recover and re-enter.',
          respectful: 'Repair language protects dignity while still naming harm or routine breaks clearly.',
          responsible: 'Students own the broken move, practice the fix, and return to community with accountability.'
        },
        recognition: {
          safe: 'Recognition stays emotionally safe when it avoids favoritism, humiliation, and vague praise.',
          respectful: 'Celebration remains fair because the criteria are public and evidence-based.',
          responsible: 'Students can point to the exact action that earned recognition or leadership trust.'
        },
        adult: {
          safe: 'Adults model calm bodies, low-drama resets, and consistency under pressure.',
          respectful: 'Adult language protects dignity and keeps correction instructional instead of personal.',
          responsible: 'Staff share cues, timing, and follow-through so students do not meet different systems.'
        },
        evidence: {
          safe: 'Evidence prevents arbitrary reactions and keeps follow-up grounded in real observation.',
          respectful: 'Recognition and coaching feel fair when the proof lane is visible.',
          responsible: 'Teams own next steps because the data points to action instead of vague concern.'
        }
      };

      return connections[trackId] || {
        safe: 'The move keeps the environment calmer and more predictable.',
        respectful: 'The move protects people, relationships, and space.',
        responsible: 'The move makes ownership visible in practice.'
      };
    }

    function gradeBandTranslation(mode, trackId, band) {
      const trackLead = {
        spine: 'value language and observable behavior examples',
        anchors: 'opening routines and predictable first moves',
        spaces: 'movement, line, and handoff routines',
        classroom: 'materials, collaboration, and task-flow systems',
        repair: 'regulation, reset, and repair language',
        recognition: 'evidence-based celebration and identity cues',
        adult: 'adult cueing, posture, and facilitation stance',
        evidence: 'lightweight proof, look-fors, and next-step tracking'
      };

      const bandMoves = {
        'K-2': 'short cue language, visuals, gestures, and immediate repeat practice',
        '3-5': 'examples, non-examples, partner talk, and visible check-for-understanding loops',
        '6-8': 'rationale, autonomy, peer leadership, and self-monitoring language'
      };

      const prefix = mode === 'adult' ? 'Adults prepare' : 'Students practice';
      return `${prefix} ${trackLead[trackId] || 'the move'} through ${bandMoves[band]}.`;
    }

    function buildRecognitionHook(card) {
      if (card.track === 'recognition' || card.track === 'evidence') {
        return card.bridge;
      }
      return `Connect the visible move to recognition language so celebration names evidence, not vibe. ${card.bridge}`;
    }

    function buildReteachMove(card) {
      return `Return to the exact broken step, re-model the move, and rerun it at full speed. For this session: ${card.action}`;
    }

    function buildCoachingLookFor(card) {
      const track = TRACK_LOOKUP[card.track];
      return `Look for whether ${track.title.toLowerCase()} is visible without extra explanation. Core look-for: ${card.skill}`;
    }

    function buildPromptSet(card) {
      const defaultReflection = card.debrief || `What is clearer now about ${TRACK_LOOKUP[card.track].title.toLowerCase()}?`;
      const reflectionMatch = (card.debrief || '').match(/Reflection:\s*(.*?)(?:Resistance:|$)/i);
      const resistanceMatch = (card.debrief || '').match(/Resistance:\s*(.*?)(?:Revelation:|$)/i);
      const revelationMatch = (card.debrief || '').match(/Revelation:\s*(.*)$/i);

      return {
        reflection: reflectionMatch ? reflectionMatch[1].trim() : defaultReflection,
        resistance: resistanceMatch ? resistanceMatch[1].trim() : card.problem,
        revelation: revelationMatch ? revelationMatch[1].trim() : `What is the next move that makes ${card.label.toLowerCase()} more visible tomorrow?`
      };
    }

    function buildAssetFlags(card) {
      return [
        { label: 'BOY training needed', value: state.mode === 'adult' },
        { label: 'Culture camp needed', value: state.mode === 'student' },
        { label: 'Needs slide', value: true },
        { label: 'Needs student lesson', value: state.mode === 'student' },
        { label: 'Needs teacher guide', value: true },
        { label: 'Needs rehearsal card', value: true },
        { label: 'Needs coaching tool', value: true },
        { label: 'Needs grade-band translation', value: card.track !== 'evidence' }
      ];
    }

    function buildDetailModel(card, session) {
      const track = TRACK_LOOKUP[card.track];
      const prompts = buildPromptSet(card);
      const connections = trackConnections(card.track);

      return {
        dayOrSession: state.mode === 'adult' ? `BOY ${session.label.replace('Session ', '')}` : session.label,
        track: track.title,
        whatThisTeaches: card.skill,
        whyItMatters: `${card.bridge} ${card.problem}`,
        safeConnection: connections.safe,
        respectfulConnection: connections.respectful,
        responsibleConnection: connections.responsible,
        adultMoves: state.mode === 'adult'
          ? `${card.action} Adult facilitation stays aligned to: ${card.consensus}`
          : `Teacher move: ${card.action}`,
        studentSteps: state.mode === 'adult'
          ? `Adults script the student-facing sequence for ${track.title.toLowerCase()} and identify the exact student behaviors they will model, practice, reset, and recognize.`
          : `${card.skill} Students should be able to name the move, practice it, and repeat it with less adult prompting.`,
        k2Translation: gradeBandTranslation(state.mode, card.track, 'K-2'),
        grade35Translation: gradeBandTranslation(state.mode, card.track, '3-5'),
        grade68Translation: gradeBandTranslation(state.mode, card.track, '6-8'),
        resourcesNeeded: card.resources,
        rehearsalMove: card.action,
        recognitionHook: buildRecognitionHook(card),
        reteachMove: buildReteachMove(card),
        coachingLookFor: buildCoachingLookFor(card),
        reflectionPrompt: prompts.reflection,
        resistancePrompt: prompts.resistance,
        revelationPrompt: prompts.revelation,
        sourceFiles: card.sources,
        playbookLocation: `${state.mode === 'adult' ? 'BOY Adult Calibration' : 'Culture Camp'} / ${track.title} / ${session.title}`,
        flags: buildAssetFlags(card)
      };
    }

    function renderModes() {
      const modeRow = document.getElementById('modeRow');
      modeRow.innerHTML = '';
      Object.values(BOARD_DATA).forEach((board) => {
        const button = createNode('button', 'mode-pill' + (state.mode === board.key ? ' active' : ''), board.button);
        button.type = 'button';
        button.addEventListener('click', () => setMode(board.key));
        modeRow.appendChild(button);
      });
    }

    function renderLegend() {
      const legendRow = document.getElementById('legendRow');
      legendRow.innerHTML = '';
      TRACKS.forEach((track) => {
        const pill = createNode('div', 'legend-pill');
        const dot = createNode('span', 'legend-dot');
        dot.style.color = track.color;
        dot.style.background = track.color;
        pill.appendChild(dot);
        pill.appendChild(createNode('span', '', track.title));
        legendRow.appendChild(pill);
      });
    }

    function renderFilters() {
      const filterRow = document.getElementById('filterRow');
      filterRow.innerHTML = '';
      const all = createNode('button', 'filter-pill' + (state.trackFilter === 'all' ? ' active' : ''), 'All Tracks');
      all.type = 'button';
      all.addEventListener('click', () => setTrackFilter('all'));
      filterRow.appendChild(all);

      TRACKS.forEach((track) => {
        const button = createNode('button', 'filter-pill' + (state.trackFilter === track.id ? ' active' : ''), track.title.replace(' and ', ' / '));
        button.type = 'button';
        button.addEventListener('click', () => setTrackFilter(track.id));
        filterRow.appendChild(button);
      });
    }

    function renderOverview() {
      const board = currentBoard();
      document.getElementById('boardSubtitle').textContent = board.subtitle;
      document.getElementById('overviewTitle').textContent = board.overviewTitle;
      document.getElementById('overviewCopy').textContent = board.overviewCopy;
    }

    function renderMatrix() {
      const grid = document.getElementById('matrixGrid');
      grid.innerHTML = '';
      const board = currentBoard();
      const active = ensureActiveCard();
      const visible = visibleCards();

      const corner = createNode('div', 'corner-cell', state.mode === 'adult' ? 'Adult Tracks' : 'Culture Camp Tracks');
      grid.appendChild(corner);

      board.sessions.forEach((session) => {
        const sessionCell = createNode('div', 'session-cell');
        const button = createNode('button', 'session-button' + (state.sessionId === session.id ? ' active' : ''));
        button.type = 'button';
        button.title = session.title;
        button.setAttribute('aria-label', session.title);
        button.addEventListener('click', () => setSession(session.id));
        button.appendChild(createNode('span', 'session-label', session.label));
        button.appendChild(createNode('span', 'session-chip', session.short));
        sessionCell.appendChild(button);
        grid.appendChild(sessionCell);
      });

      TRACKS.forEach((track) => {
        const rowVisible = state.trackFilter === 'all' || state.trackFilter === track.id;
        if (!rowVisible) {
          return;
        }

        const trackCell = createNode('div', 'track-cell');
        const index = createNode('div', 'track-index');
        index.innerHTML = `<strong>${track.short}</strong>${track.title.toUpperCase()}`;
        trackCell.appendChild(index);
        trackCell.appendChild(createNode('div', 'track-strap', track.strap));
        grid.appendChild(trackCell);

        board.sessions.forEach((session) => {
          const cell = createNode('div', 'matrix-cell' + (state.sessionId === session.id ? ' session-active' : ''));
          const stack = createNode('div', 'matrix-card-stack');
          const cards = visible.filter((card) => card.track === track.id && card.session === session.id);

          if (cards.length === 0) {
            stack.appendChild(createNode('div', 'muted-empty', state.sessionId === session.id ? 'No primary move highlighted in this lane for the selected session.' : ''));
          } else {
            cards.forEach((card) => {
              const button = createNode('button', `matrix-card ${TRACK_LOOKUP[card.track].className}` + (active && active.id === card.id ? ' active' : ''));
              button.type = 'button';
              button.title = card.title;
              button.setAttribute('aria-label', card.title);
              button.addEventListener('click', () => setCard(card.id));
              button.appendChild(createNode('span', 'mini-kicker', card.kicker));
              button.appendChild(createNode('span', 'mini-title', card.label));
              stack.appendChild(button);
            });
          }

          cell.appendChild(stack);
          grid.appendChild(cell);
        });
      });
    }

    function renderDetail() {
      const panel = document.getElementById('detailPanel');
      panel.innerHTML = '';
      const card = ensureActiveCard();
      const session = currentSession();

      const tag = createNode('div', 'mode-tag');
      const dot = createNode('span', 'legend-dot');
      dot.style.background = '#ffd97a';
      dot.style.color = '#ffd97a';
      tag.appendChild(dot);
      tag.appendChild(createNode('span', '', state.mode === 'adult' ? 'BOY Adult Calibration Track' : '10-Day Student Culture Camp Track'));
      panel.appendChild(tag);

      if (!card) {
        panel.appendChild(createNode('h3', '', session.title));
        panel.appendChild(createNode('p', 'detail-subhead', 'No card is visible under the current filter.'));
        return;
      }

      const detailModel = buildDetailModel(card, session);

      panel.appendChild(createNode('h3', '', card.title));
      panel.appendChild(createNode('p', 'detail-subhead', card.subhead));

      const metaRow = createNode('div', 'detail-meta-row');
      [
        ['Day/Session', detailModel.dayOrSession],
        ['Track', detailModel.track],
        ['Playbook location', detailModel.playbookLocation]
      ].forEach(([label, value]) => {
        metaRow.appendChild(createNode('span', 'detail-meta-pill', `${label}: ${value}`));
      });
      panel.appendChild(metaRow);

      const sectionDefinitions = [
        {
          title: 'What / Why',
          fields: [
            ['What this teaches', detailModel.whatThisTeaches],
            ['Why it matters', detailModel.whyItMatters]
          ]
        },
        {
          title: 'Safe / Respectful / Responsible',
          fields: [
            ['Safe connection', detailModel.safeConnection],
            ['Respectful connection', detailModel.respectfulConnection],
            ['Responsible connection', detailModel.responsibleConnection]
          ]
        },
        {
          title: 'Adult / Student Moves',
          fields: [
            ['Adult moves', detailModel.adultMoves],
            ['Student steps', detailModel.studentSteps],
            ['Resources needed', detailModel.resourcesNeeded],
            ['Rehearsal move', detailModel.rehearsalMove],
            ['Recognition hook', detailModel.recognitionHook],
            ['Reteach move', detailModel.reteachMove],
            ['Coaching look-for', detailModel.coachingLookFor]
          ]
        },
        {
          title: 'Grade-Band Translation',
          fields: [
            ['K-2 translation', detailModel.k2Translation],
            ['3-5 translation', detailModel.grade35Translation],
            ['6-8 translation', detailModel.grade68Translation]
          ]
        },
        {
          title: 'Prompts',
          fields: [
            ['Reflection prompt', detailModel.reflectionPrompt],
            ['Resistance prompt', detailModel.resistancePrompt],
            ['Revelation prompt', detailModel.revelationPrompt]
          ]
        }
      ];

      sectionDefinitions.forEach((sectionDef) => {
        const block = createNode('section', 'detail-block');
        block.appendChild(createNode('h4', '', sectionDef.title));
        const grid = createNode('div', 'detail-grid');

        sectionDef.fields.forEach(([label, value]) => {
          const field = createNode('div', 'detail-field');
          field.appendChild(createNode('span', 'detail-field-label', label));

          if (label === 'Why it matters') {
            const callout = createNode('div', 'problem-callout');
            callout.appendChild(createNode('p', 'detail-field-value', value));
            field.appendChild(callout);
          } else {
            field.appendChild(createNode('p', 'detail-field-value', value));
          }

          grid.appendChild(field);
        });

        block.appendChild(grid);
        panel.appendChild(block);
      });

      const flagsBlock = createNode('section', 'detail-block');
      flagsBlock.appendChild(createNode('h4', '', 'Build Assets'));
      const flagsRow = createNode('div', 'flag-row');
      detailModel.flags.forEach((flag) => {
        flagsRow.appendChild(createNode('span', `flag-pill ${flag.value ? 'yes' : 'no'}`, `${flag.label}: ${flag.value ? 'Yes' : 'No'}`));
      });
      flagsBlock.appendChild(flagsRow);
      panel.appendChild(flagsBlock);

      const sourceBlock = createNode('section', 'detail-block');
      sourceBlock.appendChild(createNode('h4', '', 'Source Files'));
      const sourceList = createNode('div', 'source-list');
      detailModel.sourceFiles.forEach((source) => {
        sourceList.appendChild(createNode('span', 'source-pill', source));
      });
      sourceBlock.appendChild(sourceList);
      panel.appendChild(sourceBlock);

      panel.appendChild(createNode('p', 'footer-note', state.mode === 'adult'
        ? 'Adult track built from the BOY calibration logic implied by the rollout bundle, the Culture Camp guides, and the training documents. The right rail now follows the original tracker schema more closely so the macro board and the explanatory session breakdown read as one system.'
        : 'Student track grounded directly in the Day-by-Day Teacher Guide themes, the Culture Camp overview, and linked operating docs. The board now combines the macro ten-day arc with the original tracker-style session fields so the what, how, and why are easier to scan.'));
    }

    function syncMatrixFocus() {
      const activeButton = document.querySelector('.session-button.active');
      if (activeButton) {
        activeButton.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
      }

      const activeCard = document.querySelector('.matrix-card.active');
      if (activeCard) {
        activeCard.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
      }
    }

    function render() {
      renderModes();
      renderLegend();
      renderFilters();
      renderOverview();
      renderMatrix();
      renderDetail();
      requestAnimationFrame(syncMatrixFocus);
    }

    ensureActiveCard();
    render();
  </script>
</body>
</html>
